<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OLS — Catalogue</title>
  <script src="config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0A0A0A;
      color: #FFFFFF;
      min-height: 100vh;
    }

    nav {
      background: #0A2A35;
      border-bottom: 1px solid #222;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand { font-size: 16px; font-weight: 700; color: #00B4D8; letter-spacing: 1px; }
    .nav-links { display: flex; gap: 4px; }
    .nav-links a {
      color: #7ECFDF; text-decoration: none; font-size: 13px;
      padding: 6px 12px; border-radius: 6px; transition: all 0.2s;
    }
    .nav-links a:hover { color: #FFF; background: #0F3D4D; }
    .nav-links a.active { color: #FFF; background: #0F3D4D; }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-user { font-size: 12px; color: #7ECFDF; }
    .btn-logout {
      font-size: 12px; color: #7ECFDF; background: none;
      border: 1px solid #1A4D5D; border-radius: 6px;
      padding: 6px 12px; cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { color: #FFF; border-color: #555; }

    .page { max-width: 1200px; margin: 0 auto; padding: 32px; }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .page-header h1 { font-size: 24px; font-weight: 700; }
    .page-header p { font-size: 13px; color: #555; margin-top: 4px; }

    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      align-items: center;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 7px 16px; background: none;
      border: 1px solid #2A2A2A; border-radius: 20px;
      color: #666; font-size: 13px; cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover { border-color: #555; color: #FFF; }
    .filter-btn.active { background: #FFF; border-color: #FFF; color: #000; font-weight: 600; }
    .search-input {
      padding: 7px 14px; background: #1A1A1A;
      border: 1px solid #2A2A2A; border-radius: 20px;
      color: #FFF; font-size: 13px; outline: none;
      width: 220px; transition: border-color 0.2s; margin-left: auto;
    }
    .search-input:focus { border-color: #00B4D8; }
    .search-input::placeholder { color: #444; }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .product-card {
      background: #141414; border: 1px solid #222;
      border-radius: 10px; overflow: hidden;
      transition: border-color 0.2s; cursor: pointer;
    }
    .product-card:hover { border-color: #00B4D8; }

    .product-img {
      width: 100%; height: 180px; background: #1A1A1A;
      display: flex; align-items: center; justify-content: center;
      color: #333; font-size: 12px; overflow: hidden;
    }
    .product-img img { 
      width: 100%; 
      height: 100%; 
      object-fit: contain; 
      background: #1A1A1A;
      padding: 12px;
    }

    .product-body { padding: 16px; }

    .product-classification {
      font-size: 10px; font-weight: 700; color: #00B4D8;
      letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px;
    }

    .product-sku {
      font-family: 'Courier New', monospace;
      font-size: 11px; color: #555; margin-bottom: 4px;
    }
    .product-name { font-size: 14px; font-weight: 600; color: #FFF; margin-bottom: 2px; }
    .product-brand { font-size: 12px; color: #555; margin-bottom: 10px; }

    .product-tags {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px;
    }
    .product-tag {
      font-size: 10px; padding: 2px 7px; border-radius: 4px;
      background: #1E1E1E; color: #666; border: 1px solid #2A2A2A;
    }

    .product-meta {
      display: flex; justify-content: space-between;
      align-items: flex-end; padding-top: 12px;
      border-top: 1px solid #1E1E1E;
    }
    .product-price-label { font-size: 10px; color: #444; margin-bottom: 2px; }
    .product-price { font-size: 15px; font-weight: 700; color: #FFF; }
    .stock-info { text-align: right; }
    .stock-label { font-size: 10px; color: #444; margin-bottom: 2px; }
    .stock-count { font-size: 15px; font-weight: 700; }

    .view-toggle { display: flex; gap: 4px; }
    .view-btn {
      padding: 6px 10px; background: none;
      border: 1px solid #2A2A2A; border-radius: 6px;
      color: #555; cursor: pointer; font-size: 14px; transition: all 0.2s;
    }
    .view-btn.active { background: #1E1E1E; color: #FFF; border-color: #444; }

    .table-wrap {
      background: #141414; border: 1px solid #222;
      border-radius: 10px; overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #0A2A35; padding: 12px 16px; text-align: left;
      font-size: 11px; font-weight: 600; color: #7ECFDF;
      text-transform: uppercase; letter-spacing: 1px;
      border-bottom: 1px solid #0F3D4D;
    }
    tbody td {
      padding: 12px 16px; font-size: 13px; color: #CCC;
      border-bottom: 1px solid #1A1A1A;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #181818; cursor: pointer; }
    .mono { font-family: 'Courier New', monospace; font-size: 12px; }

    .badge {
      font-size: 11px; padding: 3px 8px;
      border-radius: 20px; font-weight: 600;
    }
    .badge-red   { background: #2A0000; color: #E63946; border: 1px solid #3A0000; }
    .badge-green { background: #002A10; color: #52B788; border: 1px solid #003A18; }
    .badge-grey  { background: #1A1A1A; color: #666;    border: 1px solid #2A2A2A; }

    /* ── Product Detail Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 24px;
    }
    .modal {
      background: #141414; border: 1px solid #222; border-radius: 12px;
      width: 100%; max-width: 600px; max-height: 90vh;
      display: flex; flex-direction: column;
    }
    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid #222;
      display: flex; align-items: flex-start; justify-content: space-between;
      flex-shrink: 0;
    }
    .modal-header h2 { font-size: 16px; font-weight: 700; color: #FFF; }
    .modal-header-sub { font-size: 12px; color: #555; margin-top: 3px; }
    .modal-close {
      background: none; border: none; color: #555;
      font-size: 22px; cursor: pointer; line-height: 1; flex-shrink: 0;
    }
    .modal-close:hover { color: #FFF; }
    .modal-body { padding: 24px; overflow-y: auto; flex: 1; }

    .modal-img {
      width: 100%; height: 240px; border-radius: 8px; margin-bottom: 20px;
      background: #1A1A1A; display: flex; align-items: center;
      justify-content: center; color: #333; font-size: 13px; overflow: hidden;
    }
    .modal-img img { 
      width: 100%; 
      height: 100%; 
      object-fit: contain;
      padding: 12px;
    }

    .modal-section-title {
      font-size: 11px; font-weight: 700; color: #555;
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 12px; margin-top: 20px;
      padding-bottom: 6px; border-bottom: 1px solid #1E1E1E;
    }
    .modal-section-title:first-of-type { margin-top: 0; }

    .detail-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .detail-label { font-size: 11px; color: #555; margin-bottom: 3px; }
    .detail-value { font-size: 13px; color: #CCC; }
    .detail-value.mono { font-family: 'Courier New', monospace; font-size: 12px; }

    .price-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
    }
    .price-item {
      background: #1A1A1A; border: 1px solid #222;
      border-radius: 8px; padding: 12px;
    }
    .price-item-label { font-size: 10px; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .price-item-value { font-size: 15px; font-weight: 700; }
    .price-item-value.cost      { color: #F4A261; }
    .price-item-value.retail    { color: #52B788; }
    .price-item-value.wholesale { color: #00B4D8; }

    .loading { padding: 64px; text-align: center; color: #444; font-size: 13px; }
    .empty   { padding: 64px; text-align: center; color: #444; font-size: 13px; }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid #333; border-top-color: #00B4D8;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 32px; right: 32px;
      padding: 12px 20px; border-radius: 8px; font-size: 13px;
      font-weight: 600; opacity: 0; transition: opacity 0.3s;
      pointer-events: none; z-index: 999;
    }
    .toast.success { background: #002A10; color: #52B788; border: 1px solid #003A18; }
    .toast.error   { background: #2A0000; color: #E63946; border: 1px solid #3A0000; }
    .toast.visible { opacity: 1; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-brand">OLS</div>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="catalogue.html" class="active">Catalogue</a>
      <a href="inventory.html">Inventory</a>
      <a href="packing-lists.html">Packing Lists</a>
      <a href="sales-orders.html">Sales Orders</a>
      <a href="marketing-orders.html">Marketing</a>
      <a href="settings.html">Settings</a>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="navUser">Admin</span>
      <button class="btn-logout" onclick="logout()">Log out</button>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <div>
        <h1>Catalogue</h1>
        <p id="productCount">Loading products...</p>
      </div>
      <div class="view-toggle">
        <button class="view-btn active" id="btnGrid" onclick="setView('grid')" title="Grid view">⊞</button>
        <button class="view-btn" id="btnTable" onclick="setView('table')" title="Table view">☰</button>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="filterBrand('all', this)">All</button>
      <button class="filter-btn" onclick="filterBrand('Mofmofriends', this)">Mofmofriends</button>
      <button class="filter-btn" onclick="filterBrand('Stojo', this)">Stojo</button>
      <input class="search-input" type="text" id="searchInput"
        placeholder="Search SKU or product name..." oninput="applyFilters()">
    </div>

    <div class="loading" id="loadingState">
      <span class="spinner"></span>Loading catalogue...
    </div>

    <div class="product-grid" id="gridView" style="display:none"></div>

    <div class="table-wrap" id="tableView" style="display:none">
      <table>
        <thead>
          <tr>
            <th>SKU</th>
            <th>Product Name</th>
            <th>Classification</th>
            <th>Size</th>
            <th>Cost SGD</th>
            <th>Retail Price IDR</th>
            <th>Wholesale IDR</th>
            <th>Available</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="empty" id="emptyState" style="display:none">No products found</div>
  </div>

  <!-- Product Detail Modal -->
  <div class="modal-overlay" id="productModal" style="display:none" onclick="handleOverlayClick(event)">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h2 id="modalName">—</h2>
          <div class="modal-header-sub" id="modalSub">—</div>
        </div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    if (!isLoggedIn() || (!isAdmin() && !isViewer())) {
      window.location.href = 'index.html';
    }

    document.getElementById('navUser').textContent = isAdmin() ? 'Admin' : 'Viewer';

    function logout() { clearSession(); window.location.href = 'index.html'; }

    let allProducts  = [];
    let currentBrand = 'all';
    let currentView  = 'grid';

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} visible`;
      setTimeout(() => t.classList.remove('visible'), 3000);
    }

    function formatIDR(n) {
      if (!n) return '—';
      return 'Rp ' + Number(n).toLocaleString('id-ID');
    }

    function reorderBadge(flag) {
      if (flag === 'REORDER') return '<span class="badge badge-red">REORDER</span>';
      if (flag === 'OK')      return '<span class="badge badge-green">OK</span>';
      return '<span class="badge badge-grey">—</span>';
    }

    async function loadCatalogue() {
      try {
        const data  = await apiGet('getProducts');
        allProducts = Array.isArray(data) ? data : [];
        renderProducts();
      } catch (err) {
        document.getElementById('loadingState').innerHTML =
          'Error loading catalogue — ' + err.message;
        showToast('Failed to load catalogue', 'error');
      }
    }

    function filterBrand(brand, btn) {
      currentBrand = brand;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderProducts();
    }

    function applyFilters() { renderProducts(); }

    function getFiltered() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      return allProducts.filter(p => {
        const brandMatch  = currentBrand === 'all' || p.brand === currentBrand;
        const searchMatch = !search ||
          p.sku.toLowerCase().includes(search) ||
          p.productName.toLowerCase().includes(search) ||
          (p.classification || '').toLowerCase().includes(search) ||
          String(p.barcode || '').toLowerCase().includes(search);
        return brandMatch && searchMatch;
      });
    }

    function renderProducts() {
      const filtered = getFiltered();
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('productCount').textContent =
        `${filtered.length} product${filtered.length !== 1 ? 's' : ''}`;

      if (filtered.length === 0) {
        document.getElementById('gridView').style.display   = 'none';
        document.getElementById('tableView').style.display  = 'none';
        document.getElementById('emptyState').style.display = 'block';
        return;
      }

      document.getElementById('emptyState').style.display = 'none';

      if (currentView === 'grid') {
        document.getElementById('tableView').style.display = 'none';
        document.getElementById('gridView').style.display  = 'grid';
        renderGrid(filtered);
      } else {
        document.getElementById('gridView').style.display  = 'none';
        document.getElementById('tableView').style.display = 'block';
        renderTable(filtered);
      }
    }

    function renderGrid(products) {
      document.getElementById('gridView').innerHTML = products.map(p => {
        const stockColor = p.availableStock <= 0 ? '#E63946'
          : p.availableStock <= p.reorderThreshold ? '#F4A261'
          : '#52B788';
        const tags = [p.size, p.sizeType, p.ageDetail]
          .filter(Boolean)
          .map(t => `<span class="product-tag">${t}</span>`)
          .join('');
        return `
          <div class="product-card" onclick="openModal('${p.sku}')">
            <div class="product-img">
              ${p.imageUrl
                ? `<img src="${p.imageUrl}" alt="${p.productName}" loading="lazy"
                       onerror="this.parentElement.innerHTML='No image'">`
                : 'No image'}
            </div>
            <div class="product-body">
              <div class="product-classification">${p.classification || ''}</div>
              <div class="product-sku">${p.sku}</div>
              <div class="product-name">${p.productName}</div>
              <div class="product-brand">${p.brand}</div>
              ${tags ? `<div class="product-tags">${tags}</div>` : ''}
              <div class="product-meta">
                <div>
                  <div class="product-price-label">RETAIL IDR</div>
                  <div class="product-price">${formatIDR(p.priceIDR)}</div>
                </div>
                <div class="stock-info">
                  <div class="stock-label">AVAILABLE</div>
                  <div class="stock-count" style="color:${stockColor}">${p.availableStock}</div>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderTable(products) {
      document.getElementById('tableBody').innerHTML = products.map(p => {
        const stockColor = p.availableStock <= 0 ? '#E63946'
          : p.availableStock <= p.reorderThreshold ? '#F4A261'
          : '#52B788';
        return `
          <tr onclick="openModal('${p.sku}')">
            <td class="mono">${p.sku}</td>
            <td>${p.productName}</td>
            <td style="color:#00B4D8;font-size:11px">${p.classification || '—'}</td>
            <td style="color:#555">${[p.size, p.sizeType].filter(Boolean).join(' · ') || '—'}</td>
            <td style="color:#F4A261">S$ ${Number(p.costSGD || 0).toFixed(2)}</td>
            <td style="color:#52B788">${formatIDR(p.priceIDR)}</td>
            <td style="color:#00B4D8">${formatIDR(p.wholesaleIDR)}</td>
            <td style="color:${stockColor};font-weight:600">${p.availableStock}</td>
            <td>${reorderBadge(p.reorderFlag)}</td>
          </tr>
        `;
      }).join('');
    }

    function openModal(sku) {
      const p = allProducts.find(x => x.sku === sku);
      if (!p) return;

      document.getElementById('modalName').textContent = p.productName;
      document.getElementById('modalSub').textContent  = `${p.brand} · ${p.sku}`;

      document.getElementById('modalBody').innerHTML = `
        <div class="modal-img">
          ${p.imageUrl
            ? `<img src="${p.imageUrl}" alt="${p.productName}"
                   onerror="this.style.display='none'">`
            : 'No image'}
        </div>

        <div class="modal-section-title">Product Details</div>
        <div class="detail-grid">
          <div>
            <div class="detail-label">Classification</div>
            <div class="detail-value" style="color:#00B4D8">${p.classification || '—'}</div>
          </div>
          <div>
            <div class="detail-label">Size</div>
            <div class="detail-value">${p.size || '—'}</div>
          </div>
          <div>
            <div class="detail-label">Size Type</div>
            <div class="detail-value">${p.sizeType || '—'}</div>
          </div>
          <div>
            <div class="detail-label">Age Detail</div>
            <div class="detail-value">${p.ageDetail || '—'}</div>
          </div>
          <div>
            <div class="detail-label">Material</div>
            <div class="detail-value">${p.material || '—'}</div>
          </div>
          <div>
            <div class="detail-label">HS Code</div>
            <div class="detail-value mono">${p.hsCode || '—'}</div>
          </div>
          <div>
            <div class="detail-label">Barcode</div>
            <div class="detail-value mono">${p.barcode || '—'}</div>
          </div>
          <div>
            <div class="detail-label">Unit Type</div>
            <div class="detail-value">${p.unitType || '—'}</div>
          </div>
          <div>
            <div class="detail-label">Units Per Carton</div>
            <div class="detail-value">${p.unitsPerCarton || '—'}</div>
          </div>
          <div>
            <div class="detail-label">Available Stock</div>
            <div class="detail-value">${p.availableStock}</div>
          </div>
        </div>

        <div class="modal-section-title">Pricing</div>
        <div class="price-grid">
          <div class="price-item">
            <div class="price-item-label">Cost SGD</div>
            <div class="price-item-value cost">S$ ${Number(p.costSGD || 0).toFixed(2)}</div>
          </div>
          <div class="price-item">
            <div class="price-item-label">Retail Price IDR</div>
            <div class="price-item-value retail">${formatIDR(p.priceIDR)}</div>
          </div>
          <div class="price-item">
            <div class="price-item-label">Wholesale IDR</div>
            <div class="price-item-value wholesale">${formatIDR(p.wholesaleIDR)}</div>
          </div>
        </div>
      `;

      document.getElementById('productModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('productModal').style.display = 'none';
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('productModal')) closeModal();
    }

    function setView(view) {
      currentView = view;
      document.getElementById('btnGrid').classList.toggle('active',  view === 'grid');
      document.getElementById('btnTable').classList.toggle('active', view === 'table');
      renderProducts();
    }

    loadCatalogue();
  </script>

</body>
</html>
