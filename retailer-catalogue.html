<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OLS — Catalogue</title>
  <script src="config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0A0A0A; color: #FFF; min-height: 100vh;
    }
    nav {
      background: #0A2A35; border-bottom: 1px solid 0F3D4D;
      padding: 0 32px; display: flex; align-items: center;
      justify-content: space-between; height: 56px;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-brand { font-size: 16px; font-weight: 700; color: #00B4D8; letter-spacing: 1px; }
    .nav-links { display: flex; gap: 4px; }
    .nav-links a {
      color: #7ECFDF; text-decoration: none; font-size: 13px;
      padding: 6px 12px; border-radius: 6px; transition: all 0.2s;
    }
    .nav-links a:hover { color: #FFF; background: #0F3D4D; }
    .nav-links a.active { color: #FFF; background: #0F3D4D; }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-user { font-size: 12px; color: #7ECFDF; }
    .btn-logout {
      font-size: 12px; color: #7ECFDF; background: none;
      border: 1px solid #1A4D5D; border-radius: 6px;
      padding: 6px 12px; cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { color: #FFF; border-color: #555; }

    .page { max-width: 1200px; margin: 0 auto; padding: 32px; }
    .page-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 24px;
    }
    .page-header h1 { font-size: 24px; font-weight: 700; }
    .page-header p { font-size: 13px; color: #555; margin-top: 4px; }

    .btn-primary {
      padding: 10px 20px; background: #00B4D8; border: none;
      border-radius: 8px; color: #000; font-size: 13px;
      font-weight: 700; cursor: pointer; transition: background 0.2s;
      text-decoration: none; display: inline-block;
    }
    .btn-primary:hover { background: #0096B4; }

    .filters {
      display: flex; gap: 12px; margin-bottom: 24px;
      align-items: center; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 7px 16px; background: none;
      border: 1px solid #2A2A2A; border-radius: 20px;
      color: #666; font-size: 13px; cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover { border-color: #555; color: #FFF; }
    .filter-btn.active { background: #FFF; border-color: #FFF; color: #000; font-weight: 600; }
    .search-input {
      padding: 7px 14px; background: #1A1A1A;
      border: 1px solid #2A2A2A; border-radius: 20px;
      color: #FFF; font-size: 13px; outline: none;
      width: 220px; transition: border-color 0.2s; margin-left: auto;
    }
    .search-input:focus { border-color: #00B4D8; }
    .search-input::placeholder { color: #444; }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .product-card {
      background: #141414; border: 1px solid #222;
      border-radius: 10px; overflow: hidden; transition: border-color 0.2s;
      cursor: pointer;
    }
    .product-card:hover { border-color: #00B4D8; }

    .product-img {
      width: 100%; height: 180px; background: #1A1A1A;
      display: flex; align-items: center; justify-content: center;
      color: #333; font-size: 12px; overflow: hidden;
    }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }

    .product-body { padding: 16px; }

    .product-classification {
      font-size: 10px; font-weight: 700; color: #00B4D8;
      letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px;
    }

    .product-sku { font-family: 'Courier New', monospace; font-size: 11px; color: #555; margin-bottom: 4px; }
    .product-name { font-size: 14px; font-weight: 600; color: #FFF; margin-bottom: 2px; }
    .product-brand { font-size: 12px; color: #555; margin-bottom: 10px; }

    .product-tags {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px;
    }
    .product-tag {
      font-size: 10px; padding: 2px 7px; border-radius: 4px;
      background: #1E1E1E; color: #666; border: 1px solid #2A2A2A;
    }

    .product-price-row {
      display: flex; justify-content: space-between; align-items: flex-end;
      padding-top: 12px; border-top: 1px solid #1E1E1E;
    }
    .product-price { font-size: 16px; font-weight: 700; color: #FFF; }
    .product-price-label { font-size: 10px; color: #444; margin-bottom: 2px; }

    .stock-pill {
      font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 600;
    }
    .stock-ok  { background: #002A10; color: #52B788; border: 1px solid #003A18; }
    .stock-low { background: #2A1F00; color: #F4A261; border: 1px solid #3A2A00; }
    .stock-out { background: #2A0000; color: #E63946; border: 1px solid #3A0000; }

    .loading { padding: 64px; text-align: center; color: #444; font-size: 13px; }
    .empty   { padding: 64px; text-align: center; color: #444; font-size: 13px; }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid #333; border-top-color: #00B4D8;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 24px;
    }
    .modal {
      background: #141414; border: 1px solid #222; border-radius: 12px;
      width: 100%; max-width: 520px; max-height: 90vh;
      display: flex; flex-direction: column;
    }
    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid #222;
      display: flex; align-items: flex-start; justify-content: space-between;
      flex-shrink: 0;
    }
    .modal-header h2 { font-size: 16px; font-weight: 700; }
    .modal-header-sub { font-size: 12px; color: #555; margin-top: 3px; }
    .modal-close {
      background: none; border: none; color: #555;
      font-size: 22px; cursor: pointer; line-height: 1; flex-shrink: 0;
    }
    .modal-close:hover { color: #FFF; }
    .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
    .modal-footer {
      padding: 16px 24px; border-top: 1px solid #222;
      display: flex; gap: 12px; justify-content: flex-end; flex-shrink: 0;
    }

    .modal-img {
      width: 100%; height: 180px; background: #1A1A1A;
      border-radius: 8px; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: center;
      color: #333; font-size: 13px; overflow: hidden;
    }
    .modal-img img { width: 100%; height: 100%; object-fit: cover; }

    .modal-section-title {
      font-size: 11px; font-weight: 700; color: #555;
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 12px; margin-top: 20px;
      padding-bottom: 6px; border-bottom: 1px solid #1E1E1E;
    }
    .modal-section-title:first-of-type { margin-top: 0; }

    .detail-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .detail-label { font-size: 11px; color: #555; margin-bottom: 3px; }
    .detail-value { font-size: 13px; color: #CCC; }
    .detail-value.mono { font-family: 'Courier New', monospace; font-size: 12px; }

    .qty-control {
      display: flex; align-items: center; gap: 12px; margin: 20px 0;
    }
    .qty-btn {
      width: 36px; height: 36px; background: #1E1E1E;
      border: 1px solid #2A2A2A; border-radius: 8px;
      color: #FFF; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .qty-btn:hover { border-color: #00B4D8; color: #00B4D8; }
    .qty-display { font-size: 24px; font-weight: 700; min-width: 48px; text-align: center; }
    .qty-stock { font-size: 12px; color: #555; }

    .line-total {
      background: #1A1A1A; border: 1px solid #222; border-radius: 8px;
      padding: 16px; text-align: center;
    }
    .line-total-label { font-size: 11px; color: #555; margin-bottom: 4px; }
    .line-total-value { font-size: 22px; font-weight: 700; color: #FFF; }

    .btn-secondary {
      padding: 10px 20px; background: none;
      border: 1px solid #2A2A2A; border-radius: 8px;
      color: #888; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: #555; color: #FFF; }

    .toast {
      position: fixed; bottom: 32px; right: 32px;
      padding: 12px 20px; border-radius: 8px; font-size: 13px;
      font-weight: 600; opacity: 0; transition: opacity 0.3s;
      pointer-events: none; z-index: 999;
    }
    .toast.success { background: #002A10; color: #52B788; border: 1px solid #003A18; }
    .toast.error   { background: #2A0000; color: #E63946; border: 1px solid #3A0000; }
    .toast.visible { opacity: 1; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-brand">OLS</div>
    <div class="nav-links">
      <a href="retailer-catalogue.html" class="active">Catalogue</a>
      <a href="new-order.html">New Order</a>
      <a href="order-history.html">My Orders</a>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="navUser">—</span>
      <button class="btn-logout" onclick="logout()">Log out</button>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <div>
        <h1>Catalogue</h1>
        <p id="productCount">Loading products...</p>
      </div>
      <a href="new-order.html" class="btn-primary">+ Place Order</a>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="filterBrand('all', this)">All</button>
      <button class="filter-btn" onclick="filterBrand('Mofmofriends', this)">Mofmofriends</button>
      <button class="filter-btn" onclick="filterBrand('Stojo', this)">Stojo</button>
      <input class="search-input" type="text" id="searchInput"
        placeholder="Search SKU or product..." oninput="renderProducts()">
    </div>

    <div class="loading" id="loadingState">
      <span class="spinner"></span>Loading catalogue...
    </div>
    <div class="product-grid" id="productGrid" style="display:none"></div>
    <div class="empty" id="emptyState" style="display:none">No products found</div>
  </div>

  <!-- Product detail + quick order modal -->
  <div class="modal-overlay" id="quickModal" style="display:none" onclick="handleOverlayClick(event)">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h2 id="modalTitle">Product</h2>
          <div class="modal-header-sub" id="modalSub">—</div>
        </div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal()">Close</button>
        <button class="btn-primary" onclick="goToNewOrder()">Place Order</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    if (!isLoggedIn() || (!isRetailer() && !isAdmin() && !isViewer())) {
      window.location.href = 'index.html';
    }

    const session = getSession();
    document.getElementById('navUser').textContent = session.name || session.retailerId;

    function logout() { clearSession(); window.location.href = 'index.html'; }

    let allProducts     = [];
    let currentBrand    = 'all';
    let selectedProduct = null;
    let currentQTY      = 1;

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} visible`;
      setTimeout(() => t.classList.remove('visible'), 3000);
    }

    function formatIDR(n) {
      if (!n) return '—';
      return 'Rp ' + Number(n).toLocaleString('id-ID');
    }
    
    console.log('Session:', getSession());
    async function loadCatalogue() {
      try {
        const tier = session.tier || 'T2';
        const data = await apiGet('getCatalogue', { tier });
        allProducts = Array.isArray(data) ? data : [];
        document.getElementById('loadingState').style.display = 'none';
        renderProducts();
      } catch (err) {
        document.getElementById('loadingState').textContent = 'Error: ' + err.message;
      }
    }

    function filterBrand(brand, btn) {
      currentBrand = brand;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderProducts();
    }

    function renderProducts() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allProducts.filter(p => {
        const brandMatch  = currentBrand === 'all' || p.brand === currentBrand;
        const searchMatch = !search ||
          p.sku.toLowerCase().includes(search) ||
          p.productName.toLowerCase().includes(search) ||
          (p.classification || '').toLowerCase().includes(search);
        return brandMatch && searchMatch;
      });

      document.getElementById('productCount').textContent =
        `${filtered.length} product${filtered.length !== 1 ? 's' : ''}`;

      if (filtered.length === 0) {
        document.getElementById('productGrid').style.display = 'none';
        document.getElementById('emptyState').style.display  = 'block';
        return;
      }

      document.getElementById('emptyState').style.display  = 'none';
      document.getElementById('productGrid').style.display = 'grid';

      document.getElementById('productGrid').innerHTML = filtered.map(p => {
        const price = p.retailPriceIDR || 0;
        const avail = p.availableStock  || 0;
        const stockClass = avail <= 0 ? 'stock-out'
          : avail <= p.reorderThreshold ? 'stock-low'
          : 'stock-ok';
        const stockLabel = avail <= 0 ? 'Out of stock'
          : avail <= p.reorderThreshold ? `Low (${avail})`
          : `${avail} available`;
        const tags = [p.size, p.sizeType, p.ageDetail]
          .filter(Boolean)
          .map(t => `<span class="product-tag">${t}</span>`)
          .join('');

        return `
          <div class="product-card" onclick="openModal('${p.sku}')">
            <div class="product-img">
              ${p.imageUrl
                ? `<img src="${p.imageUrl}" alt="${p.productName}"
                       onerror="this.parentElement.innerHTML='No image'">`
                : 'No image'}
            </div>
            <div class="product-body">
              <div class="product-classification">${p.classification || ''}</div>
              <div class="product-sku">${p.sku}</div>
              <div class="product-name">${p.productName}</div>
              <div class="product-brand">${p.brand}</div>
              ${tags ? `<div class="product-tags">${tags}</div>` : ''}
              <div class="product-price-row">
                <div>
                  <div class="product-price-label">UNIT PRICE INC. PPN</div>
                  <div class="product-price">${formatIDR(price)}</div>
                </div>
                <span class="stock-pill ${stockClass}">${stockLabel}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function openModal(sku) {
      const p = allProducts.find(x => x.sku === sku);
      if (!p) return;
      selectedProduct = p;
      currentQTY = 1;

      document.getElementById('modalTitle').textContent = p.productName;
      document.getElementById('modalSub').textContent   = `${p.brand} · ${p.sku}`;

      const avail = p.availableStock || 0;

      document.getElementById('modalBody').innerHTML = `
        <div class="modal-img">
          ${p.imageUrl
            ? `<img src="${p.imageUrl}" alt="${p.productName}"
                   onerror="this.style.display='none'">`
            : 'No image'}
        </div>

        <div class="modal-section-title">Product Details</div>
        <div class="detail-grid">
          <div>
            <div class="detail-label">Classification</div>
            <div class="detail-value" style="color:#00B4D8">${p.classification || '—'}</div>
          </div>
          <div>
            <div class="detail-label">Size</div>
            <div class="detail-value">${p.size || '—'}</div>
          </div>
          <div>
            <div class="detail-label">Size Type</div>
            <div class="detail-value">${p.sizeType || '—'}</div>
          </div>
          <div>
            <div class="detail-label">Age Detail</div>
            <div class="detail-value">${p.ageDetail || '—'}</div>
          </div>
          <div>
            <div class="detail-label">Material</div>
            <div class="detail-value">${p.material || '—'}</div>
          </div>
          <div>
            <div class="detail-label">HS Code</div>
            <div class="detail-value mono">${p.hsCode || '—'}</div>
          </div>
          <div>
            <div class="detail-label">Units Per Carton</div>
            <div class="detail-value">${p.unitsPerCarton || '—'}</div>
          </div>
          <div>
            <div class="detail-label">Available Stock</div>
            <div class="detail-value">${avail}</div>
          </div>
        </div>

        <div class="modal-section-title">Order</div>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQTY(-1)">−</button>
          <div class="qty-display" id="qtyDisplay">1</div>
          <button class="qty-btn" onclick="changeQTY(1)">+</button>
          <span class="qty-stock">max ${avail}</span>
        </div>
        <div class="line-total">
          <div class="line-total-label">LINE TOTAL (INC. PPN)</div>
          <div class="line-total-value" id="modalLineTotal">${formatIDR(p.retailPriceIDR)}</div>
        </div>
      `;

      document.getElementById('quickModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('quickModal').style.display = 'none';
      selectedProduct = null;
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('quickModal')) closeModal();
    }

    function changeQTY(delta) {
      if (!selectedProduct) return;
      const max = selectedProduct.availableStock || 0;
      currentQTY = Math.max(1, Math.min(max, currentQTY + delta));
      document.getElementById('qtyDisplay').textContent = currentQTY;
      const lineTotal = (selectedProduct.retailPriceIDR || 0) * currentQTY;
      document.getElementById('modalLineTotal').textContent = formatIDR(lineTotal);
    }

    function goToNewOrder() {
      sessionStorage.setItem('quick_sku', selectedProduct?.sku || '');
      sessionStorage.setItem('quick_qty', currentQTY);
      window.location.href = 'new-order.html';
    }

    loadCatalogue();
  </script>

</body>
</html>
