<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SO — Print</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #FFFFFF;
      color: #0A0A0A;
      font-size: 13px;
      line-height: 1.5;
    }

    .screen-controls {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #0A0A0A;
      padding: 12px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
    }

    .screen-controls span { color: #FFF; font-size: 13px; }

    .btn-print {
      padding: 8px 20px;
      background: #00B4D8;
      border: none;
      border-radius: 6px;
      color: #000;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-back {
      padding: 8px 16px;
      background: none;
      border: 1px solid #444;
      border-radius: 6px;
      color: #CCC;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .document {
      max-width: 794px;
      margin: 80px auto 40px;
      padding: 48px;
      background: #FFF;
    }

    .loading {
      text-align: center;
      padding: 80px;
      color: #888;
      font-size: 14px;
    }

    .doc-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 2px solid #0A0A0A;
    }

    .brand-name {
      font-size: 28px;
      font-weight: 800;
      color: #0A0A0A;
      letter-spacing: -0.5px;
    }

    .brand-sub {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 4px;
    }

    .doc-title { text-align: right; }
    .doc-type { font-size: 22px; font-weight: 700; color: #0A0A0A; }
    .doc-number { font-family: 'Courier New', monospace; font-size: 14px; color: #555; margin-top: 4px; }
    .doc-date { font-size: 12px; color: #888; margin-top: 4px; }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      margin-bottom: 40px;
    }

    .info-block h3 {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #888;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #E5E5E5;
    }

    .info-row {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .info-label { color: #888; min-width: 110px; flex-shrink: 0; }
    .info-value { color: #0A0A0A; font-weight: 500; }

    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-draft     { background: #F0F0F0; color: #555; }
    .status-pending   { background: #FFF3E0; color: #E65100; }
    .status-confirmed { background: #E3F2FD; color: #1565C0; }
    .status-shipped   { background: #E8F5E9; color: #2E7D32; }
    .status-invoiced  { background: #E8F5E9; color: #2E7D32; }
    .status-cancelled { background: #FFEBEE; color: #C62828; }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #888;
      margin-bottom: 12px;
    }

    .items-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24px;
    }

    .items-table thead th {
      background: #0A0A0A;
      color: #FFF;
      padding: 10px 12px;
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .items-table thead th:last-child { text-align: right; }

    .items-table tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid #F0F0F0;
      font-size: 13px;
      color: #0A0A0A;
    }

    .items-table tbody td:last-child { text-align: right; font-weight: 600; }
    .items-table tbody tr:last-child td { border-bottom: none; }
    .items-table .sku-cell { font-family: 'Courier New', monospace; font-size: 11px; color: #555; }
    .discount-cell { color: #2E7D32; font-size: 12px; }

    .totals-section {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 40px;
    }

    .totals-box {
      width: 300px;
      border: 1px solid #E5E5E5;
      border-radius: 8px;
      overflow: hidden;
    }

    .totals-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 16px;
      font-size: 13px;
      border-bottom: 1px solid #F0F0F0;
    }

    .totals-row:last-child { border-bottom: none; }
    .totals-row .label { color: #555; }
    .totals-row .value { font-weight: 600; color: #0A0A0A; }
    .totals-row.discount .label { color: #2E7D32; }
    .totals-row.discount .value { color: #2E7D32; }
    .totals-row.grand { background: #0A0A0A; }
    .totals-row.grand .label { color: #FFF; font-weight: 700; }
    .totals-row.grand .value { color: #FFF; font-weight: 700; font-size: 15px; }

    .doc-footer {
      padding-top: 24px;
      border-top: 1px solid #E5E5E5;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .footer-note {
      font-size: 11px;
      color: #888;
      max-width: 300px;
      line-height: 1.6;
    }

    .footer-stamp { text-align: right; }
    .footer-stamp .generated { font-size: 10px; color: #CCC; }

    @media print {
      .screen-controls { display: none !important; }
      .document { margin: 0; padding: 32px; max-width: 100%; }
      body { font-size: 12px; }
      .brand-name { font-size: 22px; }
      .doc-type { font-size: 18px; }
    }

    @page { size: A4; margin: 0; }
  </style>
</head>
<body>

  <div class="screen-controls">
    <a class="btn-back" href="sales-orders.html" onclick="navigateBack(event)">← Back</a>
    <span id="controlTitle">Loading...</span>
    <button class="btn-print" onclick="window.print()">
      Download / Print PDF
    </button>
  </div>

  <div class="document" id="document">
    <div class="loading" id="loadingState">Loading order details...</div>
  </div>

  <script src="config.js"></script>
  <script>
    const params   = new URLSearchParams(window.location.search);
    const soNumber = params.get('so');
    const urlCode  = params.get('code');

    if (urlCode) {
      sessionStorage.setItem('ols_code', urlCode);
      sessionStorage.setItem('ols_role', 'admin');
    }

    if (!isLoggedIn()) {
      document.getElementById('document').innerHTML =
        '<div class="loading">Session expired. Please <a href="index.html">log in</a> and try again.</div>';
      document.getElementById('controlTitle').textContent = 'Not logged in';
    } else if (!soNumber) {
      document.getElementById('document').innerHTML =
        '<div class="loading">No SO number provided.</div>';
    } else {
      loadSO(soNumber);
    }

    function formatIDR(n) {
      return 'Rp ' + Number(n).toLocaleString('id-ID');
    }

        // ── Helper: Get Margin % for Tier ──
    function getTierMargin(tier) {
      const margins = {
        'T1': 30,
        'T2': 35,
        'T3': 37.5,
        'T4': 45,
        'WHOLESALE': 5
      };
      return margins[tier] || 37.5;
    }

        function navigateBack(e) {
      e.preventDefault();
      
      // Try to go back in history first (if same tab)
      if (window.history.length > 1) {
        window.history.back();
      } else {
        // Otherwise, redirect to SO page with auth code
        const code = sessionStorage.getItem('ols_code') || '';
        window.location.href = `sales-orders.html?code=${encodeURIComponent(code)}`;
      }
    }

    // ── Helper: Calc Margin from Total (for PDF) ──
    function calcMarginFromTotalPDF(totalIDR, tier, ppnPct = 12) {
      const marginPct = getTierMargin(tier);
      const totalExclPPN = totalIDR / (1 + ppnPct / 100);
      const baseWithHandling = totalExclPPN / (1 + marginPct / 100);
      const marginAmount = baseWithHandling * (marginPct / 100);
      return Math.ceil(marginAmount / 1000) * 1000;
    }

    function formatDate(d) {
      if (!d) return '—';
      return new Date(d).toLocaleDateString('id-ID', {
        day: '2-digit', month: 'long', year: 'numeric'
      });
    }

    function statusClass(status) {
      const map = {
        'Draft'            : 'status-draft',
        'Pending Approval' : 'status-pending',
        'Confirmed'        : 'status-confirmed',
        'Shipped'          : 'status-shipped',
        'Invoiced'         : 'status-invoiced',
        'Cancelled'        : 'status-cancelled',
      };
      return map[status] || 'status-draft';
    }

    async function loadSO(soNumber) {
      try {
        const code = urlCode || sessionStorage.getItem('ols_code') || '';
        const res  = await fetch(
          `${CONFIG.API_URL}?action=getSODetail&soNumber=${encodeURIComponent(soNumber)}&code=${encodeURIComponent(code)}`
        );
        const raw   = await res.json();
        const h     = raw.header;
        const items = raw.lineItems || [];

        if (!h || !h.soNumber) {
          throw new Error('SO not found');
        }

        document.title = `${soNumber} — OLS`;
        document.getElementById('controlTitle').textContent = soNumber;

        const now = new Date().toLocaleDateString('id-ID', {
          day: '2-digit', month: 'long', year: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });

        document.getElementById('document').innerHTML = `
          <div class="doc-header">
            <div>
              <div class="brand-name">OLS</div>
              <div class="brand-sub">One Logistics Solutions</div>
            </div>
            <div class="doc-title">
              <div class="doc-type">Sales Order</div>
              <div class="doc-number">${h.soNumber}</div>
              <div class="doc-date">${formatDate(h.orderDate)}</div>
            </div>
          </div>

          <div class="info-grid">
            <div class="info-block">
              <h3>Order Details</h3>
              <div class="info-row">
                <span class="info-label">Brand</span>
                <span class="info-value">${h.brand}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Order Type</span>
                <span class="info-value">${h.orderType}</span>
              </div>
              ${h.poRef ? `
              <div class="info-row">
                <span class="info-label">PO Reference</span>
                <span class="info-value" style="font-family:monospace">${h.poRef}</span>
              </div>` : ''}
              <div class="info-row">
                <span class="info-label">Status</span>
                <span class="info-value">
                  <span class="status-badge ${statusClass(h.status)}">${h.status}</span>
                </span>
              </div>
            </div>
            <div class="info-block">
              <h3>Retailer</h3>
              <div class="info-row">
                <span class="info-label">Retailer ID</span>
                <span class="info-value" style="font-family:monospace">${h.retailerId}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Tier</span>
                <span class="info-value">${h.tier}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Order Date</span>
                <span class="info-value">${formatDate(h.orderDate)}</span>
              </div>
              ${h.notes ? `
              <div class="info-row">
                <span class="info-label">Notes</span>
                <span class="info-value">${h.notes}</span>
              </div>` : ''}
            </div>
          </div>

          <div class="section-title">Line Items</div>
          <table class="items-table">
            <thead>
              <tr>
                <th>SKU</th>
                <th>Description</th>
                <th>QTY</th>
                <th>Unit Price (inc. PPN)</th>
                <th>Discount</th>
                <th>Final Total</th>
              </tr>
            </thead>
            <tbody>
              ${items.map(i => `
                <tr>
                  <td class="sku-cell">${i.sku}</td>
                  <td>${i.description}</td>
                  <td>${i.qty}</td>
                  <td>${formatIDR(i.unitPrice)}</td>
                  <td class="discount-cell" style="color: ${i.discountPct > 0 ? '#2E7D32' : '#888'};">
                      ${i.discountPct > 0 ? i.discountPct + '%' : '0%'}
                </td>
                  <td>${formatIDR(i.finalTotal || i.lineTotal)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>

            <div class="totals-section">
  <div class="totals-box">
    <div class="totals-row">
      <span class="label">Subtotal (excl. PPN)</span>
      <span class="value">${formatIDR(Math.round(h.subtotal / 1.12 / 1000) * 1000)}</span>
    </div>
    <div class="totals-row">
      <span class="label">PPN 12%</span>
      <span class="value">${formatIDR(h.subtotal - Math.round(h.subtotal / 1.12 / 1000) * 1000)}</span>
    </div>
    ${h.orderType === 'Retailer PO' && h.tier ? `
    <div class="totals-row" style="color: #00B4D8;">
      <span class="label">Est. Margin ${h.tier} (${getTierMargin(h.tier)}%)</span>
      <span class="value">${formatIDR(calcMarginFromTotalPDF(h.totalIDR, h.tier))}</span>
    </div>` : ''}
    <div class="totals-row" style="color: ${h.discountPct > 0 ? '#2E7D32' : '#888'};">
      <span class="label">Discount (${h.discountPct || 0}%)</span>
      <span class="value">-${formatIDR(h.discountAmt || 0)}</span>
    </div>
    <div class="totals-row grand">
      <span class="label">Total IDR</span>
      <span class="value">${formatIDR(h.totalIDR)}</span>
    </div>
  </div>
</div>

          <div class="doc-footer">
            <div class="footer-note">
              This document is generated by OLS Inventory Management System.
              For questions, contact prambani@onelogisticssolutions.com
            </div>
            <div class="footer-stamp">
              <div class="generated">Generated: ${now}</div>
            </div>
          </div>
        `;

      } catch (err) {
        document.getElementById('document').innerHTML =
          `<div class="loading">Error loading SO: ${err.message}</div>`;
      }
    }
  </script>
</body>
</html>
